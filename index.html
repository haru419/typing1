<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイピングゲームDX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:20px;
}

.word{
font-size:42px;
font-weight:bold;
text-align:center;
margin:20px 0;
color:#38bdf8;
min-height:60px;
}

#comboEffect{
height:60px;
text-align:center;
font-size:36px;
font-weight:bold;
color:#facc15;
transition:.15s;
}

input{
width:100%;
padding:15px;
font-size:24px;
border:none;
border-radius:12px;
outline:none;
}

.stats{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.stat{
background:#334155;
padding:10px 15px;
border-radius:10px;
}

button{
padding:14px 22px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:.85;
}

.result{
display:none;
text-align:center;
margin-top:20px;
}

.result h2{
margin-bottom:15px;
}

.final{
font-size:24px;
margin:10px 0;
}

.ranking{
margin-top:30px;
}

.ranking h2{
margin-bottom:10px;
}

.rank-item{
background:#334155;
padding:10px;
border-radius:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h1>⌨️ タイピングゲームDX</h1>

<div id="startArea" style="text-align: center;">
<button onclick="startGame()">ゲーム開始</button>
</div>

<div id="gameArea" style="display:none">
<div class="word" id="word"></div>
<div id="comboEffect"></div>
<input id="input" autocomplete="off" spellcheck="false">

<div class="stats">
<div class="stat">時間: <span id="time">60</span></div>
<div class="stat">スコア: <span id="score">0</span></div>
<div class="stat">ミス: <span id="miss">0</span></div>
<div class="stat">COMBO: <span id="combo">0</span></div>
<div class="stat">MAX: <span id="maxCombo">0</span></div>
<div class="stat">正確率: <span id="accuracy">100</span>%</div>
</div>
</div>

<div class="result" id="result">
<h2>🎉ゲーム終了！</h2>

<div class="final">スコア: <span id="finalScore"></span></div>
<div class="final">最大コンボ: <span id="finalCombo"></span></div>
<div class="final">正確率: <span id="finalAccuracy"></span>%</div>
<div class="final">順位: <span id="myRank">-</span>位</div>  

<div class="ranking">
<h2>🏆ランキング</h2>
<div id="rankingList"></div>
</div>

<br>
<button onclick="location.reload()">もう一度遊ぶ</button>
</div>

</div>
</div>

<script>
// --- Supabaseの初期化 (コードの最初で行う) ---
const SUPABASE_URL = "https://dwisqhvtopryncyxrdxu.supabase.co";
const SUPABASE_KEY = "sb_publishable_5f5R90kWymJJJlU7D18DLw_n16zST-T";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const words=[
"apple","banana","orange","grape","melon","peach","lemon",
"computer","keyboard","mouse","monitor","internet",
"github","javascript","html","css","coding","supabase",
"school","teacher","student","library","science","history",
"summer","winter","spring","autumn","weather","rainbow",
"dragon","wizard","castle","monster","adventure","magic",
"planet","galaxy","universe","rocket","astronaut",
"football","baseball","basketball","volleyball",
"hamburger","sandwich","icecream","chocolate",
"friendship","challenge","victory","strategy",
"algorithm","framework","development","performance",
"optimization","database","network","application",
"browser","security","function","variable","object",
"python","typescript","programming","developer",
"engineering","technology","creative","amazing",
"fantastic","powerful","beautiful","lightning",
"thunder","volcano","mountain","river","ocean"
];

let currentWord="";
let score=0;
let miss=0;
let combo=0;
let maxCombo=0;
let totalType=0;
let time=60;
let timer;

const word=document.getElementById("word");
const input=document.getElementById("input");

const scoreEl=document.getElementById("score");
const missEl=document.getElementById("miss");
const comboEl=document.getElementById("combo");
const maxComboEl=document.getElementById("maxCombo");
const accuracyEl=document.getElementById("accuracy");
const timeEl=document.getElementById("time");

const comboEffect=document.getElementById("comboEffect");
const rankingList =document.getElementById("rankingList");

const icons = ["😀","😎","🔥","⚡","👑","🐱","🐶","🦊","🐧","🐼"];

// --- サウンド関数 ---
function playCorrect(){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
osc.frequency.value=700;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.05);
}

function playMiss(){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
osc.frequency.value=150;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.08);
}

function playFinish(){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
osc.frequency.value=500;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.3);
}

// --- ゲームロジック ---
function randomWord(){
currentWord = words[Math.floor(Math.random()*words.length)];
word.textContent=currentWord;
}

function showCombo(){
if(combo<3){
comboEffect.textContent="";
return;
}
comboEffect.textContent = "🔥 " + combo + " COMBO!";
comboEffect.style.transform = "scale(1.3)";
setTimeout(()=>{
comboEffect.style.transform = "scale(1)";
},100);
}

function startGame(){
score=0;
miss=0;
combo=0;
maxCombo=0;
totalType=0;
time=60;

scoreEl.textContent=0;
missEl.textContent=0;
comboEl.textContent=0;
maxComboEl.textContent=0;
accuracyEl.textContent=100;
timeEl.textContent=60;

document.getElementById("startArea").style.display="none";
document.getElementById("gameArea").style.display="block";

randomWord();
input.value="";
input.focus();

timer=setInterval(()=>{
time--;
timeEl.textContent=time;
if(time<=0){
clearInterval(timer);
endGame();
}
},1000);
}

async function endGame(){
playFinish();

document.getElementById("gameArea").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("finalScore").textContent=score;
document.getElementById("finalCombo").textContent=maxCombo;
document.getElementById("finalAccuracy").textContent=accuracyEl.textContent;

// 不正チェック
if(score > 5000){
alert("不正スコアです");
return;
}
if(maxCombo > 300){
return;
}

// スコア保存と順位取得
await saveScore();
await showMyRank(score);
}

async function showMyRank(score){
const {data, error} = await supabase.from("ranking").select("score");
if(error) { console.error(error); return; }

const higher = data.filter(x => x.score > score).length;
document.getElementById("myRank").textContent = higher + 1;
}

async function saveScore(){
const name = prompt("名前を入力してください");
if(!name) return;

const icon = icons[Math.floor(Math.random()*icons.length)];

const { error } = await supabase
.from("ranking")
.insert({
name:name,
score:score,
icon:icon,
combo:maxCombo,
accuracy:parseInt(accuracyEl.textContent)
});

if(error) console.error(error);

await loadRanking();
}

async function loadRanking(){
const {data, error} = await supabase
.from("ranking")
.select("*")
.order("score",{ascending:false})
.limit(100);

if(error){
console.error(error);
return;
}

// ランキング表示の更新
rankingList.innerHTML="";
data.forEach((r,i)=>{
rankingList.innerHTML += `
<div class="rank-item">
<span>
${r.icon || "😀"}
${i+1}. ${r.name}
</span>
<span>${r.score} pts</span>
</div>
`;
});
}

// --- イベント listener の登録 (常に有効にする) ---
input.addEventListener("input",()=>{
if(input.value===currentWord){
playCorrect();
combo++;
if(combo>maxCombo){
maxCombo=combo;
}
score+=combo;
scoreEl.textContent=score;
comboEl.textContent=combo;
maxComboEl.textContent=maxCombo;
showCombo();
input.value="";
randomWord();
}
});

input.addEventListener("keydown",(e)=>{
if(e.key.length===1){
totalType++;
}
if(e.key.length===1 && currentWord[input.value.length]!==e.key){
playMiss();
miss++;
combo=0;
missEl.textContent=miss;
comboEl.textContent=0;
const accuracy=Math.max(0,Math.round((totalType/(totalType+miss))*100));
accuracyEl.textContent=accuracy;
}
});
</script>

</body>
</html>
